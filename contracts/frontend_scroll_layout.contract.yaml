module:
  name: frontend_scroll_layout
  language: typescript
  path: src/scroll/scrollBehavior.ts
  version: 1.4.0
  description: Shared primitive scroll behavior contract for panel containers, including overflow checks, boundary clamping, and wheel consumption helpers.
functions:
  - name: canScrollInDirection
    description: Returns whether the container can scroll further in the wheel direction for the given axis.
    locked: false
    inputs:
      el:
        type: HTMLElement
        required: true
      axis:
        type: '"vertical" | "horizontal"'
        required: true
      delta:
        type: number
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: none
  - name: applyWheelScroll
    description: Applies wheel delta on the target axis, clamps within bounds, and reports whether movement was consumed.
    locked: false
    inputs:
      el:
        type: HTMLElement
        required: true
      axis:
        type: '"vertical" | "horizontal"'
        required: true
      delta:
        type: number
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: mutates scrollTop or scrollLeft
  - name: applyScrollbarDrag
    description: Applies direct scrollbar drag position updates with boundary clamping.
    locked: false
    inputs:
      el:
        type: HTMLElement
        required: true
      axis:
        type: '"vertical" | "horizontal"'
        required: true
      nextPosition:
        type: number
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: mutates scrollTop or scrollLeft
  - name: shouldHandleHorizontalWheel
    description: Returns true only when the horizontal container has overflow, receives vertical wheel delta, and no nested vertically-scrollable ancestor can consume the movement.
    locked: false
    inputs:
      container:
        type: 'HTMLElement | null'
        required: true
      event:
        type: 'Pick<WheelEvent<HTMLElement>, "target" | "deltaY">'
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: none
  - name: applyHorizontalScroll
    description: Applies deltaY as horizontal scrollLeft movement to the advanced columns container.
    locked: false
    inputs:
      container:
        type: 'HTMLElement | null'
        required: true
      deltaY:
        type: number
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: mutates scrollLeft
  - name: handleVerticalWheel
    description: Consumes vertical wheel events for child containers only when the container can move; otherwise allows parent handoff.
    locked: false
    inputs:
      event:
        type: WheelEvent<HTMLElement>
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: may call preventDefault and stopPropagation
  - name: handleHorizontalWheelFromWheel
    description: Routes wheel intent to horizontal scrolling in advanced columns, preferring deltaY for wheel-to-horizontal behavior.
    locked: false
    inputs:
      event:
        type: WheelEvent<HTMLElement>
        required: true
    returns:
      type: boolean
    exceptions: []
    side_effects: may call preventDefault and stopPropagation
classes: []
data_structures:
  - name: frontend_scroll_behavior_expectations
    description: Contract-declared frontend scroll scenarios that must be validated by automated tests.
    fields:
      settings_panel_vertical_wheel:
        type: implemented
      advanced_panel_horizontal_wheel_to_horizontal:
        type: implemented
      advanced_panel_horizontal_wheel_overflow_gated:
        type: implemented
      advanced_panel_nested_vertical_scroll_guard:
        type: implemented
      advanced_column_vertical_wheel:
        type: implemented
      scrollbar_drag_settings_advanced_columns_advanced_column:
        type: implemented
      boundary_clamp_and_parent_handoff:
        type: implemented
dependencies:
  - src/scroll/scrollRouting.ts
  - tests/frontend-scroll-layout.test.ts
  - tests/settings-scroll-stability.test.tsx
