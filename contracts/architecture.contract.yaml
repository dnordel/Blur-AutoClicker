system_name: Blur AutoClicker
layers:
  - desktop_ui
  - frontend
  - backend
services:
  desktop_window_service:
    description: Hosts and sizes the Tauri desktop main window.
    modules:
      - tauri_window_config
  settings_service:
    description: Maintains user settings schema and persistence in the frontend.
    modules:
      - store
      - settings_panel
  frontend_control_panels:
    description: Renders simple and advanced control panels for click and scroll actions with a single scroll-owner routing model per panel.
    modules:
      - simple_panel
      - advanced_panel_layout
      - frontend_scroll_layout
      - frontend_scroll_routing
      - frontend_scroll_debug
  input_automation_engine:
    description: Executes timed click and scroll actions through Windows input events.
    modules:
      - engine_mod
      - engine_worker
      - engine_mouse
datastores: []
external_apis: []
background_jobs: []
