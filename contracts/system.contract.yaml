modules:
  app:
    path: src/App.tsx
    depends_on:
      - store
      - simple_panel
      - advanced_panel_layout
      - settings_panel
      - frontend_scroll_routing
      - frontend_scroll_debug
  tauri_window_config:
    path: src-tauri/tauri.conf.json
    depends_on: []
  store:
    path: src/store.ts
    depends_on: []
  simple_panel:
    path: src/components/panels/SimplePanel.tsx
    depends_on:
      - store
  advanced_panel_layout:
    path: src/components/panels/AdvancedPanelLayout.tsx
    depends_on:
      - store
      - frontend_scroll_routing
      - frontend_scroll_debug
  settings_panel:
    path: src/components/panels/SettingsPanel.tsx
    depends_on:
      - store
      - frontend_scroll_routing
      - frontend_scroll_debug
  frontend_scroll_layout:
    path: src/scroll/scrollBehavior.ts
    depends_on: []
  frontend_scroll_routing:
    path: src/scroll/scrollRouting.ts
    depends_on:
      - frontend_scroll_layout
      - frontend_scroll_debug
  frontend_scroll_debug:
    path: src/scroll/scrollOwnershipDebug.ts
    depends_on: []
  frontend_scroll_layout_tests:
    path: tests/frontend-scroll-layout.test.ts
    depends_on:
      - frontend_scroll_layout
      - frontend_scroll_routing
      - frontend_scroll_debug
  settings_scroll_stability_ui_test:
    path: tests/settings-scroll-stability.test.tsx
    depends_on:
      - settings_panel
      - frontend_scroll_routing
      - frontend_scroll_debug
  app_window_resize_behavior_test:
    path: tests/app-window-resize-behavior.test.tsx
    depends_on:
      - app
      - store
  engine_mod:
    path: src-tauri/src/engine/mod.rs
    depends_on:
      - engine_worker
  engine_worker:
    path: src-tauri/src/engine/worker.rs
    depends_on:
      - engine_mouse
      - engine_mod
  engine_mouse:
    path: src-tauri/src/engine/mouse.rs
    depends_on: []
